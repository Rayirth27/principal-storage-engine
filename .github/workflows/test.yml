# .github/workflows/test.yml
name: Engine Verification Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-system:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Runtime ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.matrix.python-version }}

    - name: Install Package & Dev Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Syntax Alignment Checks (Ruff)
      run: ruff check src/

    - name: Execute Automated Test Matrix (Pytest)
      run: pytest
